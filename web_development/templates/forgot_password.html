<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | PockiTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
</head>
<body>
    <!-- Background Image -->
    <div class="background">
        <img src="{{ url_for('static', filename='images/background.svg') }}" alt="Background">
    </div>

    <!-- Header (Logo only) -->
    <header>
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="Logo" class="logo">
    </header>

    <!-- Main Forgot Password Container -->
    <main class="forgot-password-container">
        <div class="forgot-password-card">
            <h2>Forgot Your Password?</h2>
            <p>Enter your email to receive password reset instructions.</p>

            <!-- Forgot Password Form -->
            <form method="POST" action="/forgot_password">
                <input type="email" name="email" placeholder="Email Address" required>
                <button type="submit">Send Reset Link</button>
            </form>

            <p class="login-text">
                Remember your password? <a href="{{ url_for('login') }}">Login</a>
            </p>
        </div>
    </main>
</body>
</html>
